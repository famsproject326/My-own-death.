<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; overflow: hidden; }
        
        #game-ui { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 400px; text-align: center; z-index: 10; background: rgba(0,0,0,0.85); padding: 25px; border: 1px solid #555; border-radius: 5px; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .memo-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: #ccc; }
        
        #memo-btn { position: absolute; bottom: 30px; right: 20px; width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 1px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; z-index: 10; cursor: pointer; }
        #msg { position: absolute; top: 80px; width: 80%; left: 10%; text-align: center; font-size: 1.1rem; z-index: 5; color: #eee; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="msg">……何が起きたんだ？</div>
        <canvas id="canvas"></canvas>
        <div id="ui-overlay" onclick="closeOverlay()"></div>
        <div id="memo-btn" onclick="showMemoList()">記憶</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        const uiOverlay = document.getElementById('ui-overlay');
        const img = new Image();
        img.src = 'IMG_4790.PNG'; 

        let collectedMemos = [];
        let inventory = []; // 所持品リスト

        function showMemoList() {
            uiOverlay.style.display = 'block';
            uiOverlay.innerHTML = "<h3>記憶の断片</h3>" + 
                (collectedMemos.length === 0 ? "<p style='color:#666;'>まだ何も思い出せない。</p>" : 
                collectedMemos.map((m, i) => `<div class="memo-item" onclick="showDetail(${i}); event.stopPropagation();">${m.title}</div>`).join(""));
        }

        function showDetail(index) {
            uiOverlay.innerHTML = `<h3>${collectedMemos[index].title}</h3><p style='margin:20px 0;'>${collectedMemos[index].body}</p><small style='color:#666;'>タップで閉じる</small>`;
        }

        function closeOverlay() { uiOverlay.style.display = 'none'; }

        const items = [
            { id: 'glass', x: 400, y: 800, r: 50, title: "ガラス片" },
            { id: 'toy', x: 780, y: 750, r: 100, title: "テディベア" },
            { id: 'box', x: 520, y: 550, r: 80, isBox: true },
            { id: 'phone', x: 200, y: 850, r: 80, title: "スマホ", body: "画面の時刻は『04』時で止まっている。" },
            { id: 'ring', x: 200, y: 720, r: 50, title: "指輪", body: "内側に『1204』とある。" }
        ];

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const tx = ((e.touches[0].clientX - rect.left) / rect.width) * 1000;
            const ty = ((e.touches[0].clientY - rect.top) / rect.height) * 1000;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r) {
                    // ガラス片を入手
                    if (item.id === 'glass') {
                        if (!inventory.includes('glass')) {
                            inventory.push('glass');
                            msgDiv.innerText = "ガラス片を拾った。鋭い…何かを切るのに使えそうだ。";
                        }
                    } 
                    // テディベアを加工
                    else if (item.id === 'toy') {
                        if (inventory.includes('glass')) {
                            if (!collectedMemos.find(m => m.title === "古い手紙")) {
                                collectedMemos.push({ title: "古い手紙", body: "『ヒロへ。産まれてきてくれてありがとう。体重2983gの宝物。』" });
                                msgDiv.innerText = "ガラス片でタグを切った。中から手紙が出てきた。";
                            }
                        } else {
                            msgDiv.innerText = "テディベア。タグが付いている。何かで切れば開けそうだ。";
                        }
                    } 
                    // 箱の判定など
                    else if (item.isBox) {
                        let input = prompt("4桁の数字を入力");
                        if (input === "1204") { msgDiv.innerText = "箱が開いた。……あなたは死にました。"; }
                    } else {
                        if (!collectedMemos.find(m => m.title === item.title)) {
                            collectedMemos.push({ title: item.title, body: item.body || "" });
                        }
                        msgDiv.innerText = item.title + "を調べた...";
                    }
                }
            });
        });

        img.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
