<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; overflow: hidden; }
        
        #game-ui { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* メッセージ＆メモ表示用UI */
        #ui-overlay { 
            position: absolute; top: 50px; width: 80%; left: 10%; 
            text-align: center; font-size: 1.1rem; z-index: 6; 
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; 
            display: none; transition: opacity 0.5s;
        }
        .memo-item { padding: 10px; border-bottom: 1px solid #444; cursor: pointer; color: #aaa; }
        .memo-item:hover { color: #fff; }
        
        #memo-btn { position: absolute; bottom: 30px; right: 20px; width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-ui">
        <canvas id="canvas"></canvas>
        <div id="ui-overlay" onclick="closeOverlay()"></div>
        <div id="memo-btn" onclick="showMemoList()">記憶</div>
    </div>

    <script>
        const uiOverlay = document.getElementById('ui-overlay');
        // メモのデータ構造（タイトルと詳細を分ける）
        let memos = [
            { title: "テディベア", body: "あの子がいつも抱いていたテディベア。タグには『2983』と刻まれている。" },
            { title: "スマホ", body: "ひび割れた画面。時刻は『04』時で止まっている。何があった？" },
            { title: "指輪", body: "内側に『1204』の刻印。誰の指輪だったのか。" }
        ];

        // 記憶リストを表示
        function showMemoList() {
            uiOverlay.style.display = 'block';
            uiOverlay.innerHTML = "<h3>記憶の断片</h3>" + 
                memos.map((m, i) => `<div class="memo-item" onclick="showDetail(${i}); event.stopPropagation();">${m.title}</div>`).join("");
        }

        // 詳細を表示
        function showDetail(index) {
            uiOverlay.innerHTML = `<h3>${memos[index].title}</h3><p>${memos[index].body}</p><small>(タップで閉じる)</small>`;
        }

        function closeOverlay() {
            uiOverlay.style.display = 'none';
        }

        // ... (以下、前回までのCanvas描画やアイテムタップ等のコード)
    </script>
</body>
</html>
