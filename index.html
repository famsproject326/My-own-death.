<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-ui { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #msg { position: absolute; bottom: 80px; width: 80%; left: 10%; text-align: center; font-size: 1.1rem; z-index: 6; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: none; transition: opacity 0.3s; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="msg">……何が起きたんだ？</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        const img = new Image();
        img.src = 'IMG_4790.PNG'; 

        const DEBUG = true; // 位置調整が終わったら false にしてください

        const items = [
            { id: 'outside', x: 500, y: 300, r: 400, text: "救急隊の光が激しく明滅している。" },
            { id: 'toy', x: 780, y: 750, r: 100, text: "泥だらけのテディベア。タグに『307』という文字が見える。" },
            { id: 'box', x: 520, y: 550, r: 80, text: "黒い箱。4桁の数字を求めている。" },
            { id: 'phone', x: 200, y: 850, r: 80, text: "割れたスマホ。画面の時刻は『04』時で止まっている。" },
            { id: 'ring', x: 200, y: 720, r: 50, text: "スマホのすぐ近くに落ちている指輪。内側には『1204』と刻印されている。" },
            { id: 'mirror', x: 550, y: 280, r: 50, text: "ルームミラー。何も映らない。" }
        ];

        img.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (DEBUG) {
                items.forEach(item => {
                    ctx.beginPath();
                    ctx.arc(item.x * canvas.width / 1000, item.y * canvas.height / 1000, item.r * canvas.width / 1000, 0, Math.PI*2);
                    ctx.strokeStyle = 'red';
                    ctx.stroke();
                });
            }
        }

        canvas.addEventListener('touchstart', (e) => {
            const tx = (e.touches[0].clientX / canvas.width) * 1000;
            const ty = (e.touches[0].clientY / canvas.height) * 1000;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力");
                        if (input === "1204") { msgDiv.innerText = "箱が開いた。中には君からの手紙が入っていた。"; }
                        else { msgDiv.innerText = "番号が違うようだ……。"; }
                    } else {
                        msgDiv.innerText = item.text;
                    }
                    msgDiv.style.opacity = 1;
                }
            });
        });
    </script>
</body>
</html>
