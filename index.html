<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 10; cursor: pointer;
        }

        .fade-text { opacity: 0; animation: fadeIn 2s ease-in-out forwards; }
        #tap-to-start { margin-top: 50px; animation: blink 2s ease-in-out infinite; font-size: 0.9rem; color: #888; }

        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        
        /* ロゴ回避用の黒帯 */
        #footer-cover {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
            background-color: #000; z-index: 5;
        }

        #msg { 
            position: absolute; bottom: 70px; width: 90%; left: 5%; 
            text-align: center; font-size: 1.1rem; line-height: 1.6;
            opacity: 0; transition: opacity 1.5s ease-in-out; pointer-events: none;
            text-shadow: 0 0 10px #000; z-index: 6;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="handleStart()">
        <div id="screen1">
            <p class="fade-text" style="font-size: 1.5rem;">僕は死んだ。</p>
            <p class="fade-text" style="font-size: 1.5rem; animation-delay: 2s;">僕は笑った。</p>
        </div>
        <div id="screen2" style="display: none;">
            <p style="font-size: 1.2rem;">なぜ、男は笑ったのか。</p>
            <p id="tap-to-start">タップして開始</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="msg">車内には、手がかりが落ちているようだ。</div>
        <canvas id="canvas"></canvas>
        <div id="footer-cover"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        
        // ★ここを画像ファイル名に変更しました
        const img = new Image();
        img.src = 'IMG_4789.PNG'; 
        
        let gameClear = false;

        const items = [
            { id: 'phone', x: 400, y: 700, r: 60, text: "スマホの画面。通知時間は『12』時で止まっている。" },
            { id: 'toy', x: 800, y: 950, r: 80, text: "ぬいぐるみのタグに『04』という刺繍がある。" },
            { id: 'mirror', x: 540, y: 500, r: 50, text: "ルームミラー。映るはずの誰かの影は、もうどこにもない。" },
            { id: 'belt', x: 350, y: 900, r: 70, text: "引きちぎれたシートベルト。僕を縛り付けていた、最後の枷。" },
            { id: 'box', x: 550, y: 800, r: 90, text: "見覚えのない箱。4桁の数字を求めている。" }
        ];

        function handleStart() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            if (s1.style.display !== 'none') {
                s1.style.display = 'none';
                s2.style.display = 'block';
            } else {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                initGame();
            }
        }

        function initGame() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            img.onload = draw;
            draw();
            setTimeout(() => { msg.style.opacity = 1; }, 500);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const dpr = window.devicePixelRatio;
            // 画像を少し上にずらして描画（ロゴ回避）
            const offsetY = -50 * dpr; 
            ctx.drawImage(img, 0, offsetY / dpr, window.innerWidth, (canvas.height - offsetY) / dpr);
            
            // 暗いフィルター
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }

        function showMsg(text) { 
            msg.style.opacity = 0; 
            setTimeout(() => { msg.innerHTML = text; msg.style.opacity = 1; }, 500); 
        }

        canvas.addEventListener('touchstart', (e) => {
            if (gameClear) return;
            const tx = e.touches[0].clientX * window.devicePixelRatio;
            const ty = e.touches[0].clientY * window.devicePixelRatio;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r + 20) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力してください");
                        if (input === "1204") {
                            showMsg("12月4日……僕たちが家族になった日。<br>僕だけで済んだんだ。");
                            gameClear = true;
                        } else {
                            showMsg("……違う。もっと大切な日付だったはずだ。");
                        }
                    } else {
                        showMsg(item.text);
                    }
                }
            });
        });
    </script>
</body>
</html>
