<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; position: fixed; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 10; }
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #msg { position: absolute; bottom: 80px; width: 80%; left: 10%; text-align: center; font-size: 1.1rem; z-index: 6; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <div id="start-screen" onclick="handleStart()">
        <p>タップして開始</p>
    </div>

    <div id="game-ui">
        <div id="msg">……車内には、手がかりがあるようだ。</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        const img = new Image();
        img.src = 'IMG_4789.PNG'; 

        // ★DEBUGをtrueにすると赤い円が表示されます。位置合わせに使ってください。
        const DEBUG = true; 

        // 画面を1000x1000の座標系としてアイテムを配置
        const items = [
            { id: 'outside', x: 500, y: 300, r: 400, text: "フロントガラスの向こうで、赤と青の光が揺れている。消防士たちが必死に動いている。" },
            { id: 'toy', x: 800, y: 850, r: 100, text: "泥だらけのテディベア。あの子がいつも持っていたものだ。" },
            { id: 'box', x: 450, y: 550, r: 80, text: "運転席に黒い箱がある。4桁の数字が必要だ。" },
            { id: 'mirror', x: 540, y: 350, r: 50, text: "ルームミラー。映るはずの誰かの影は、もうどこにもない。" }
        ];

        function handleStart() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            initGame();
        }

        function initGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 画像を画面全体に表示
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (DEBUG) {
                items.forEach(item => {
                    ctx.beginPath();
                    // 1000ベースの座標を実際の画面サイズに変換
                    ctx.arc(item.x * canvas.width / 1000, item.y * canvas.height / 1000, item.r * canvas.width / 1000, 0, Math.PI*2);
                    ctx.strokeStyle = 'red';
                    ctx.stroke();
                });
            }
        }

        canvas.addEventListener('touchstart', (e) => {
            const tx = (e.touches[0].clientX / canvas.width) * 1000;
            const ty = (e.touches[0].clientY / canvas.height) * 1000;

            items.forEach(item => {
                const dist = Math.hypot(item.x - tx, item.y - ty);
                if (dist < item.r) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力");
                        if (input === "1204") { msgDiv.innerText = "12月4日。僕たちの誕生日だ。"; }
                        else { msgDiv.innerText = "……違う。"; }
                    } else {
                        msgDiv.innerText = item.text;
                    }
                    msgDiv.style.opacity = 1;
                }
            });
        });
    </script>
</body>
</html>
