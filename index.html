<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 20; }
        
        /* タイトル画面 */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 10; cursor: pointer; transition: opacity 1.5s; }
        .title-text { font-size: 2.5rem; letter-spacing: 0.2rem; margin-bottom: 3rem; }
        
        /* イントロダクション（追加分） */
        #intro-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 15; cursor: pointer; text-align: center; }
        .fade-text { opacity: 0; animation: fadeIn 2s ease-in-out forwards; margin: 10px 0; }
        .delay-1 { animation-delay: 1s; }
        .delay-2 { animation-delay: 3s; }
        .delay-3 { animation-delay: 5s; }

        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* ... 他のUIはこれまで通り ... */
    </style>
</head>
<body>

    <div id="loading">読み込み中...</div>
    
    <div id="start-screen" onclick="showIntro()">
        <div class="title-text">My-own-death.</div>
        <div style="color:#888;">Touch to start.</div>
    </div>

    <div id="intro-screen" onclick="startGame()">
        <p class="fade-text">僕は死んだ。</p>
        <p class="fade-text delay-1">僕は笑った。</p>
        <p class="fade-text delay-2" style="margin-top: 50px;">なぜ男は笑ったのか。</p>
        <p class="fade-text delay-3" style="color:#444; margin-top: 50px;">（タップで物語へ）</p>
    </div>

    <div id="game-ui">
        <div id="msg">……何が起きたんだ？</div>
        <canvas id="canvas"></canvas>
        <div id="ui-overlay" onclick="closeOverlay()"></div>
        <div id="memo-btn" onclick="showMemoList()">記憶</div>
    </div>

    <script>
        // 画像読み込み完了後の初期表示
        img.onload = () => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        };

        function showIntro() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }
        
        // ... 他の機能はこれまで通りのものを記述 ...
    </script>
</body>
</html>
