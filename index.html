<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; overflow: hidden; }
        
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #msg { position: absolute; top: 50px; width: 80%; left: 10%; text-align: center; font-size: 1.2rem; z-index: 6; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: none; transition: opacity 0.5s; }
        
        /* ★右下のメモボタン */
        #memo-btn { 
            position: absolute; bottom: 30px; right: 20px; 
            width: 60px; height: 60px; background: rgba(255,255,255,0.1); 
            border: 1px solid #fff; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 0.8rem; z-index: 10; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-ui" style="display: block;"> <div id="msg">何が起きたんだ……？</div>
        <canvas id="canvas"></canvas>
        <div id="memo-btn" onclick="openMemo()">記憶</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        
        // 記憶のリスト
        let collectedNotes = ["まだ何も思い出せない..."];

        function openMemo() {
            msgDiv.innerText = "【記憶の断片】\n" + collectedNotes.join("\n");
            msgDiv.style.opacity = 1;
        }

        // ここに以前のcanvas描画やタッチイベントを追加
        // ぬいぐるみを調べた時に collectedNotes.push("307という数字を見た") とすれば、
        // 記憶ボタンを押した時にそれが表示されるようになります
    </script>
</body>
</html>
