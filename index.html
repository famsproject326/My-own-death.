<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 10; cursor: pointer; 
        }
        .fade-text { opacity: 0; animation: fadeIn 2s ease-in-out forwards; }

        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #msg { 
            position: absolute; bottom: 80px; width: 80%; left: 10%; 
            text-align: center; font-size: 1.2rem; z-index: 6; 
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; 
            pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="handleStart()">
        <div id="screen1">
            <p class="fade-text" style="font-size: 1.5rem;">僕は死んだ。</p>
            <p class="fade-text" style="font-size: 1.5rem; animation-delay: 2s;">僕は笑った。</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="msg">……何が起きたんだ？</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        const img = new Image();
        
        // ★GitHubにアップロードした実際のファイル名に合わせてください（大文字小文字注意）
        img.src = 'IMG_4790.PNG'; 

        const items = [
            { id: 'outside', x: 500, y: 300, r: 400, text: "外では赤と青の光が激しく明滅している。" },
            { id: 'toy', x: 780, y: 750, r: 100, text: "テディベア。タグに『307』という文字が見える。" },
            { id: 'box', x: 520, y: 550, r: 80, text: "黒い箱。4桁の数字を求めている。" },
            { id: 'phone', x: 200, y: 850, r: 80, text: "割れたスマホ。画面の時刻は『04』時で止まっている。" },
            { id: 'ring', x: 200, y: 720, r: 50, text: "指輪。内側に『1204』と刻印されている。" }
        ];

        // オープニングからゲーム画面への切り替え
        function handleStart() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            initGame();
        }

        // ★修正：画像の読み込みを待ってから描画する関数
        function initGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 既に画像が読み込み終わっている場合
            if (img.complete) {
                draw();
            } else {
                // まだなら読み込んでから描画
                img.onload = () => {
                    draw();
                };
                // 読み込みエラー対策
                img.onerror = () => {
                    console.error("画像の読み込みに失敗しました: " + img.src);
                    msgDiv.innerText = "エラー: 画像を読み込めませんでした。";
                };
            }
        }

        // 描画処理
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 画像を画面全体に描画
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // 暗いフィルター
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // タップ判定
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const tx = ((e.touches[0].clientX - rect.left) / rect.width) * 1000;
            const ty = ((e.touches[0].clientY - rect.top) / rect.height) * 1000;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力");
                        if (input === "1204") { 
                            msgDiv.innerText = "箱が開いた。……あなたは死にました。さあ、静寂を受け入れなさい。"; 
                        } else { 
                            msgDiv.innerText = "……違う。"; 
                        }
                    } else {
                        msgDiv.innerText = item.text;
                    }
                    msgDiv.style.opacity = 1;
                }
            });
        });
    </script>
</body>
</html>
