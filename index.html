<style>
    body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; overflow: hidden; }
    
    /* フェードイン・点滅のアニメーション */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    #start-screen { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: #000; z-index: 10; cursor: pointer;
    }

    /* 画面1と2の制御 */
    .fade-text { animation: fadeIn 2s ease-in-out forwards; }
    #tap-to-start { 
        margin-top: 50px; 
        animation: blink 2s ease-in-out infinite; 
        font-size: 0.9rem; color: #888; 
    }

    #game-ui { display: none; }
    canvas { display: block; }
    #msg { position: absolute; bottom: 20%; width: 80%; left: 10%; text-align: center; font-size: 1.1rem; opacity: 0; transition: opacity 1.5s; pointer-events: none; }
</style>

<body>
    <div id="start-screen" onclick="showSecondScreen()">
        <div id="screen1">
            <p class="fade-text" style="font-size: 1.5rem;">僕は死んだ。</p>
            <p class="fade-text" style="font-size: 1.5rem; animation-delay: 2s;">僕は笑った。</p>
        </div>
        <div id="screen2" style="display: none;">
            <p style="font-size: 1.2rem;">なぜ、男は笑ったのか。</p>
            <p id="tap-to-start">タップして開始</p>
        </div>
    </div>

    <div id="game-ui">
        <div id="msg">車内には、手がかりが落ちているようだ。</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        function showSecondScreen() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            
            if (s1.style.display !== 'none') {
                s1.style.display = 'none';
                s2.style.display = 'block';
            } else {
                // 2画面目でタップされたらゲーム本編へ
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                draw();
                setTimeout(() => { msg.style.opacity = 1; }, 500);
            }
        }
        // 以下、ゲーム本体のロジックは前のコードと同じ
    </script>
</body>
