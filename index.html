<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; 
            overflow: hidden; 
        }
        canvas { display: block; }
        #msg { 
            position: absolute; 
            bottom: 20%; 
            width: 80%; 
            left: 10%; 
            text-align: center; 
            font-size: 1.1rem; 
            line-height: 2.0;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div id="msg">静かな夜。車内には、僕ひとり。</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        
        // 高解像度設定：ピクセル密度を2倍以上にして精細に描画する
        const dpr = window.devicePixelRatio || 2;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);

        let foundCount = 0;
        const items = [
            { id: 'phone', x: 80, y: 350, r: 40, text: "家族の笑顔が映るスマホ。画面はもう、消えている。" },
            { id: 'toy', x: 280, y: 400, r: 35, text: "後部座席に転がるぬいぐるみ。子供の温もりだけが、そこにある。" },
            { id: 'mirror', x: 200, y: 150, r: 30, text: "ルームミラー。映るはずの誰かの影は、もうどこにもない。" },
            { id: 'belt', x: 120, y: 500, r: 30, text: "引きちぎれたシートベルト。僕を縛り付けていた、最後の枷。" },
            { id: 'box', x: 200, y: 300, r: 50, text: "……見覚えのない、小さな箱。今、開く時がきたようだ。" }
        ];

        function showMsg(text) {
            msg.style.opacity = 0;
            setTimeout(() => {
                msg.innerHTML = text;
                msg.style.opacity = 1;
            }, 500);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景の漆黒
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // 各オブジェクトの描画
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.r, 0, Math.PI*2);
                
                // 線の滑らかさを出すための影設定
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 15;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 影をリセット
                ctx.shadowBlur = 0;
            });
        }

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            // 拡大率を考慮した座標計算
            const tx = touch.clientX;
            const ty = touch.clientY;

            items.forEach(item => {
                const dist = Math.hypot(item.x - tx, item.y - ty);
                if (dist < item.r + 20) { // タップ範囲を少し広めに設定
                    if (item.id === 'box') {
                        if (foundCount >= 4) {
                            showMsg("僕だけで済んだんだ。");
                        } else {
                            showMsg("まだ、過去が残っている気がする。");
                        }
                    } else {
                        if (msg.innerHTML !== item.text) {
                            showMsg(item.text);
                            foundCount++;
                        }
                    }
                }
            });
        });

        window.onload = () => { 
            draw(); 
            setTimeout(() => { msg.style.opacity = 1; }, 500);
        };
    </script>
</body>
</html>
