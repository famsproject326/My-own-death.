<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        #text { position: absolute; top: 10%; width: 100%; text-align: center; pointer-events: none; font-size: 18px; line-height: 1.5; padding: 0 20px; }
    </style>
</head>
<body>
    <div id="text"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const textDiv = document.getElementById('text');
        
        let foundItems = 0;
        const totalItems = 3;
        let isFinished = false;

        // 車内のオブジェクト位置 (x, y, radius, label)
        const objects = [
            { x: 100, y: 500, r: 40, label: "スマホ", desc: "画面には家族の写真。楽しそうに笑っている。" },
            { x: 300, y: 600, r: 40, label: "おもちゃ", desc: "後部座席に落ちていた。子供の温もりが残っている。" },
            { x: 200, y: 300, r: 50, label: "箱", desc: "不自然に置かれた、見覚えのない箱。" }
        ];

        function draw() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 簡易的な車内の描写
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 5;
            objects.forEach((obj, i) => {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = "white";
                ctx.fillText(obj.label, obj.x - 20, obj.y + 5);
            });
        }

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const tx = touch.clientX - rect.left;
            const ty = touch.clientY - rect.top;

            objects.forEach((obj, i) => {
                const dist = Math.hypot(obj.x - tx, obj.y - ty);
                if (dist < obj.r && !isFinished) {
                    if (obj.label === "箱") {
                        if (foundItems >= totalItems - 1) {
                            textDiv.innerHTML = "僕だけで済んだんだ。";
                            isFinished = true;
                        } else {
                            textDiv.innerHTML = "まだ、調べていないものがある。";
                        }
                    } else {
                        textDiv.innerHTML = obj.desc;
                        if (!obj.found) { obj.found = true; foundItems++; }
                    }
                }
            });
        });

        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            textDiv.innerHTML = "静かな車内。<br>家族の気配を探そう。";
            draw();
        };
    </script>
</body>
</html>
