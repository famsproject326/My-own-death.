<script>
    // アイテムリストを最新の状態に修正
    const items = [
        { id: 'outside', x: 500, y: 300, r: 400, title: "救急隊", body: "外では赤と青の光が激しく明滅している。隊員たちが必死に動いている。" },
        { id: 'gloves', x: 520, y: 700, r: 50, title: "軍手", body: "汚れた軍手。手を保護できそうだ。" },
        { id: 'glass', x: 400, y: 800, r: 50, title: "ガラス片" },
        { id: 'toy', x: 780, y: 750, r: 100, title: "テディベア" },
        { id: 'box', x: 520, y: 550, r: 80, isBox: true },
        { id: 'phone', x: 200, y: 850, r: 80, title: "スマホ", body: "画面の時刻は『04』時で止まっている。" },
        { id: 'ring', x: 200, y: 720, r: 50, title: "指輪", body: "内側に『1204』とある。" },
        { id: 'shadow', x: 380, y: 500, r: 100, isShadow: true }
    ];

    // ... タッチイベント内を以下のように調整 ...
    canvas.addEventListener('touchstart', (e) => {
        // ... (省略: 座標計算) ...

        items.forEach(item => {
            if (Math.hypot(item.x - tx, item.y - ty) < item.r) {
                
                // 救急隊の判定を追加
                if (item.id === 'outside') {
                    if (!collectedMemos.find(m => m.title === "救急隊")) {
                        collectedMemos.push({ title: item.title, body: item.body });
                    }
                    msgDiv.innerText = "外では赤と青の光が激しく明滅している。";
                }
                // 軍手の判定
                else if (item.id === 'gloves') {
                    if (!inventory.includes('gloves')) {
                        inventory.push('gloves');
                        msgDiv.innerText = "軍手を手に入れた。";
                    }
                }
                // ガラス片の判定（軍手所持が条件）
                else if (item.id === 'glass') {
                    if (inventory.includes('gloves')) {
                        if (!inventory.includes('glass')) {
                            inventory.push('glass');
                            msgDiv.innerText = "軍手をしてガラス片を拾った。";
                        } else {
                            msgDiv.innerText = "すでにガラス片を持っている。";
                        }
                    } else {
                        msgDiv.innerText = "素手では危ない。何かで保護しないと…";
                    }
                }
                // テディベア（ガラス片所持が条件）
                else if (item.id === 'toy') {
                    if (inventory.includes('glass')) {
                        if (!collectedMemos.find(m => m.title === "古い手紙")) {
                            collectedMemos.push({ title: "古い手紙", body: "『ヒロへ。産まれてきてくれてありがとう。体重2983gの宝物。』" });
                            msgDiv.innerText = "ガラス片でタグを切った。中から手紙が出てきた。";
                        } else {
                            msgDiv.innerText = "もう何も入っていない。";
                        }
                    } else {
                        msgDiv.innerText = "テディベア。タグが付いている。何かで切れば開けそうだ。";
                    }
                }
                // その他（箱や人影、スマホなど）
                else if (item.isBox) { /* ... */ }
                else if (item.isShadow) { /* ... */ }
                else {
                    if (!collectedMemos.find(m => m.title === item.title)) {
                        collectedMemos.push({ title: item.title, body: item.body || "" });
                    }
                    msgDiv.innerText = item.title + "を調べた...";
                }
            }
        });
    });
</script>
