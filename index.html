<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: serif; overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 10; cursor: pointer; 
        }
        .fade-text { opacity: 0; animation: fadeIn 3s ease-in-out forwards; }
        .delay-text { opacity: 0; animation: fadeIn 3s ease-in-out forwards; animation-delay: 3s; }

        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #msg { 
            position: absolute; top: 50px; width: 80%; left: 10%; 
            text-align: center; font-size: 1.2rem; z-index: 6; 
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; 
            pointer-events: none; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="handleStart()">
        <p class="fade-text" style="font-size: 1.5rem; margin-bottom: 20px;">僕は死んだ。</p>
        <p class="delay-text" style="font-size: 1.5rem;">僕は笑った。</p>
        <p style="margin-top: 50px; color: #555; font-size: 0.9rem;">（タップして物語へ）</p>
    </div>

    <div id="game-ui">
        <div id="msg">何が起きたんだ……？</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgDiv = document.getElementById('msg');
        const img = new Image();
        img.src = 'IMG_4790.PNG'; 

        function handleStart() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            setupCanvas();
        }

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            if (img.complete) { draw(); } else { img.onload = draw; }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }

        // 以前と同じアイテム判定処理
        const items = [
            { id: 'outside', x: 500, y: 300, r: 400, text: "外では赤と青の光が激しく明滅している。" },
            { id: 'toy', x: 780, y: 750, r: 100, text: "テディベア。タグに『2983』という文字が見える。" },
            { id: 'box', x: 520, y: 550, r: 80, text: "黒い箱。4桁の数字を求めている。" },
            { id: 'phone', x: 200, y: 850, r: 80, text: "割れたスマホ。画面の時刻は『04』時で止まっている。" },
            { id: 'ring', x: 200, y: 720, r: 50, text: "指輪。内側に『1204』と刻印されている。" },
            { id: 'shadow', x: 380, y: 500, r: 100, text: "運転席の人影。" }
        ];

        let shadowTapCount = 0;
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const tx = ((e.touches[0].clientX - rect.left) / rect.width) * 1000;
            const ty = ((e.touches[0].clientY - rect.top) / rect.height) * 1000;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力");
                        if (input === "1204") { 
                            msgDiv.innerText = "箱が開いた。……あなたは死にました。さあ、静寂を受け入れなさい。"; 
                        } else { msgDiv.innerText = "……違う。"; }
                    } else if (item.id === 'shadow') {
                        shadowTapCount++;
                        msgDiv.innerText = (shadowTapCount === 1) ? "僕は死んだんだ。" : "事故に遭ったんだ。";
                    } else {
                        msgDiv.innerText = item.text;
                    }
                    msgDiv.style.opacity = 1;
                }
            });
        });
    </script>
</body>
</html>
