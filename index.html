<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; overflow: hidden; }
        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 10; cursor: pointer;
        }
        #game-ui { display: none; } /* 最初は非表示 */
        #msg { position: absolute; bottom: 20%; width: 80%; left: 10%; text-align: center; font-size: 1.1rem; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="start-screen">
        <p style="font-size: 1.5rem;">僕は死んだ。</p>
        <p style="font-size: 1.5rem;">僕は笑った。</p>
        <br>
        <p style="font-size: 1rem; color: #666;">なぜ、男は笑ったのか。</p>
        <p style="font-size: 0.8rem; margin-top: 50px;">タップして開始</p>
    </div>

    <div id="game-ui">
        <div id="msg">車内には、手がかりが落ちているようだ。</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- 画面切り替えの処理 ---
        const startScreen = document.getElementById('start-screen');
        const gameUI = document.getElementById('game-ui');
        
        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            gameUI.style.display = 'block';
            draw(); // ゲーム開始
            setTimeout(() => { msg.style.opacity = 1; }, 500);
        });

        // --- 以下、ゲームの本体 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        
        const dpr = window.devicePixelRatio || 2;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);

        let collectedInfo = { phone: false, toy: false, mirror: false, belt: false };
        let gameClear = false;

        const items = [
            { id: 'phone', x: 80, y: 350, r: 40, text: "スマホの画面。通知時間は『12』時で止まっている。" },
            { id: 'toy', x: 280, y: 400, r: 35, text: "ぬいぐるみのタグに『04』という刺繍がある。" },
            { id: 'mirror', x: 200, y: 150, r: 30, text: "ミラーには何も映らない。ただの暗闇だ。" },
            { id: 'belt', x: 120, y: 500, r: 30, text: "ベルトが切れている。激しい衝撃だったようだ。" },
            { id: 'box', x: 200, y: 300, r: 50, text: "見覚えのない箱。4桁の数字を求めている。" }
        ];

        function showMsg(text) { msg.style.opacity = 0; setTimeout(() => { msg.innerHTML = text; msg.style.opacity = 1; }, 500); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.r, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        document.getElementById('canvas').addEventListener('touchstart', (e) => {
            if (gameClear) return;
            const touch = e.touches[0];
            const tx = touch.clientX;
            const ty = touch.clientY;

            items.forEach(item => {
                if (Math.hypot(item.x - tx, item.y - ty) < item.r + 20) {
                    if (item.id === 'box') {
                        let input = prompt("4桁の数字を入力してください");
                        if (input === "1204") {
                            showMsg("12月4日……僕たちが家族になった日。<br>僕だけで済んだんだ。");
                            gameClear = true;
                        } else {
                            showMsg("……違う。もっと大切な日付だったはずだ。");
                        }
                    } else {
                        collectedInfo[item.id] = true;
                        showMsg(item.text);
                    }
                }
            });
        });
    </script>
</body>
</html>
